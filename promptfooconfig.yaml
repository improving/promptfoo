# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Devin CLI evaluation using promptfoo

# Define prompts to test
prompts:
  - 'You are a helpful coding assistant. {{query}}'
  - 'Explain the following code: {{code}}'
  - 'Write a function to: {{task}}'

# Use devin cli as a provider via script execution
providers:
  # Devin CLI provider (commented out for testing)
  # - id: 'exec: ./devin_provider.sh'
  #   config:
  #     model: 'SWE-1.6'

  # GitHub Copilot CLI provider (commented out for testing)
  # - id: 'exec: ./gh_copilot_provider.sh'
  #   config:
  #     model: 'claude-haiku-4.5'

  # Claude Code CLI provider
  - id: 'exec: ./claude_code_provider.sh'
    config:
      model: 'haiku'

# Test cases with variables
tests:
  - vars:
      query: 'What is the difference between let and const in JavaScript?'
    description: 'JavaScript concepts question'

  - vars:
      query: 'How do I reverse a string in Python?'
    description: 'Python coding question'

  - vars:
      code: |
        function fibonacci(n) {
          if (n <= 1) return n;
          return fibonacci(n - 1) + fibonacci(n - 2);
        }
    description: 'Code explanation task'

  - vars:
      task: 'sort an array of integers in ascending order'
    description: 'Function writing task'

# Output configuration
outputPath: results.html